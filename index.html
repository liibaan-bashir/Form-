<!doctype html>
<html lang="so">
<head>
  <meta charset="utf-8" />
  <title>Dhaqtar Abbas Professional Training Institute - Foomka Diiwaangelinta</title>
</head>
<body>
  <header>
    <h1>Dhaqtar Abbas Professional Training Institute</h1>
    <h2>Foomka Diiwaangelinta Ardayda</h2>
  </header>

  <form action="./thanks.html">
    <!-- Personal information -->
    <fieldset>
      <legend>Xogta Ardayga</legend>

      <label for="magaca_koowaad">Magaca Koowaad:</label>
      <input type="text" id="magaca_koowaad" name="magaca_koowaad" /><br /><br />

      <label for="magaca_aabaha">Magaca Aabaha:</label>
      <input type="text" id="magaca_aabaha" name="magaca_aabaha" /><br /><br />

      <label for="magaca_hooyo">Magaca Hooyo:</label>
      <input type="text" id="magaca_hooyo" name="magaca_hooyo" /><br /><br />

      <label for="taariikhda_dhalashada">Taariikhda Dhalashada:</label>
      <input type="date" id="taariikhda_dhalashada" name="taariikhda_dhalashada" /><br /><br />

      <label for="goobta_dhalashada">Goobta / Dhalashada:</label>
      <input type="text" id="goobta_dhalashada" name="goobta_dhalashada" /><br /><br />

      <p>Jinsiga:</p>
      <input type="radio" id="lab" name="jinsiga" value="lab" />
      <label for="lab">Lab</label>
      <input type="radio" id="dhedig" name="jinsiga" value="dhedig" />
      <label for="dhedig">Dhedig</label><br /><br />

      <label for="cinwaan">Cinwaanka:</label>
      <input type="text" id="cinwaan" name="cinwaan" /><br /><br />

      <label for="degmada">Degmada:</label>
      <input type="text" id="degmada" name="degmada" /><br /><br />

      <label for="nooca_dhiiga">Nooca Dhiiga:</label>
      <input type="text" id="nooca_dhiiga" name="nooca_dhiiga" /><br /><br />

      <label for="lambarka_teleefanka">Lambarka Taleefanka:</label>
      <input type="tel" id="lambarka_teleefanka" name="lambarka_teleefanka" /><br /><br />

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" /><br /><br />

      <label for="photo">Sawir (xagasha saddex-xagalka ee foomka):</label><br />
      <input type="file" id="photo" name="photo" accept="image/*" /><br /><br />
    </fieldset>

    <!-- Education -->
    <fieldset>
      <legend>Xogta Waxbarashada</legend>

      <label for="school_previous">School Hore ee aad ka Soo Baxday:</label><br />
      <input type="text" id="school_previous" name="school_previous" /><br /><br />

      <p>Shahaadada Aad Haysato:</p>
      <input type="checkbox" id="sh_asaasiga" name="shahaado[]" value="asaasiga" />
      <label for="sh_asaasiga">Heerka Asaasiiga</label>
      <input type="checkbox" id="sh_dhexe" name="shahaado[]" value="dhexe" />
      <label for="sh_dhexe">Heerka Dhexe</label>
      <input type="checkbox" id="sh_sare" name="shahaado[]" value="sare" />
      <label for="sh_sare">Heerka Sare</label><br /> <br>

      <p>Koorsada La Doortay (xulo mid ama ka badan):</p>
      <input type="checkbox" id="compTIA" name="koorso[]" value="CompTIA A+" />
      <label for="compTIA">CompTIA A+</label><br />
      <input type="checkbox" id="office2021" name="koorso[]" value="Office 2021" />
      <label for="office2021">Office 2021</label><br />
      <input type="checkbox" id="webdev" name="koorso[]" value="Web Development" />
      <label for="webdev">Web Development</label><br />
      <input type="checkbox" id="networking" name="koorso[]" value="Networking" />
      <label for="networking">Networking</label><br />
      <input type="checkbox" id="dbadmin" name="koorso[]" value="Database Admin" />
      <label for="dbadmin">Database Admin</label><br />
      <input type="checkbox" id="graphic" name="koorso[]" value="Graphic Design and Multimedia" />
      <label for="graphic">Graphic Design and Multimedia</label><br />
      <input type="checkbox" id="mobileapp" name="koorso[]" value="Mobile App" />
      <label for="mobileapp">Mobile App</label><br />
      <input type="checkbox" id="programming" name="koorso[]" value="Programming Language" />
      <label for="programming">Programming Language</label><br /><br />

      <p>Xiliga Waxbarashada:</p>
      <input type="radio" id="subax" name="xiliga" value="subax" />
      <label for="subax">Subax</label>
      <input type="radio" id="galab" name="xiliga" value="galab" />
      <label for="galab">Galab</label>
      <input type="radio" id="habeen" name="xiliga" value="habeen" />
      <label for="habeen">Habeen</label><br /><br />
    </fieldset>

    <!-- Additional details -->
    <fieldset>
      <legend>Faahfaahinta Dheeraadka ah</legend>

      <label for="caqabad">Ma jirtaa Caqabad Waxbarasho oo Aad Dareemeyso? Faahfaahi:</label><br />
      <textarea id="caqabad" name="caqabad" rows="4" cols="50"></textarea><br /><br />

      <label for="macluumaad_kale">Macluumaad kale ama su'aalo:</label><br />
      <textarea id="macluumaad_kale" name="macluumaad_kale" rows="3" cols="50"></textarea><br /><br />
    </fieldset>

    <!-- Consent / signature -->
    <fieldset>
      <legend>Ogolaansho</legend>
      <input type="checkbox" id="consent" name="consent" value="aqbal" />
      <label for="consent">Waxaan xaqiijinayaa in macluumaadkan uu sax yahay.</label><br /><br />

      <label for="date_signed">Taariikhda:</label>
      <input type="date" id="date_signed" name="date_signed" /><br /><br />
    </fieldset><br> <br>

    <button type="submit" >Gudbi</button>
    <button type="reset">Dib u celi</button>
  </form>
</body>
</html>
